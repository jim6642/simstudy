<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末冲刺！— 大学生肉鸽模拟器</title>
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --accent: #e2b04a;
  --knowledge: #4cc9f0;
  --energy: #06d6a0;
  --score: #f72585;
  --danger: #ef476f;
  --text: #e0e0e0;
  --dim: #888;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
}
#game {
  width:100%;
  max-width:920px;
  min-height:100vh;
  padding:20px;
  display:flex;
  flex-direction:row;
  align-items:flex-start;
  justify-content:center;
  gap:20px;
}
#main-col {
  flex:1;
  max-width:520px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
#history-sidebar {
  width:240px;
  flex-shrink:0;
  background:var(--panel);
  border-radius:16px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  position:sticky;
  top:20px;
}
#history-sidebar h3 {
  color:var(--accent);
  font-size:15px;
  text-align:center;
  margin:0;
}
#history-table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
#history-table th {
  color:var(--dim);
  padding:4px 6px;
  border-bottom:1px solid #333;
}
#history-table td {
  padding:4px 6px;
  text-align:center;
  border-bottom:1px solid #222;
}
#history-chart {
  width:100%;
  border-radius:8px;
  background:#0d1117;
}
.history-empty {
  color:var(--dim);
  font-size:12px;
  text-align:center;
  padding:20px 0;
}

/* ===== HEADER STATS BAR ===== */
#stats-bar {
  width:100%;
  display:flex;
  gap:10px;
  margin-bottom:16px;
}
.stat-card {
  flex:1;
  background:var(--panel);
  border-radius:12px;
  padding:10px 8px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.stat-card .icon { font-size:22px; }
.stat-card .label { font-size:11px; color:var(--dim); margin-top:2px; }
.stat-card .value { font-size:22px; font-weight:bold; margin-top:2px; }
.stat-card.knowledge .value { color:var(--knowledge); }
.stat-card.energy .value { color:var(--energy); }
.stat-card.score .value { color:var(--score); }
.stat-card .bar-wrap {
  height:4px; background:#333; border-radius:2px; margin-top:6px; overflow:hidden;
}
.stat-card .bar-fill {
  height:100%; border-radius:2px; transition:width 0.5s;
}
.stat-card.knowledge .bar-fill { background:var(--knowledge); }
.stat-card.energy .bar-fill { background:var(--energy); }
.stat-card.score .bar-fill { background:var(--score); }

/* ===== DAY/TIME INDICATOR ===== */
#day-indicator {
  display:flex; gap:6px; margin-bottom:16px; align-items:center;
}
.day-dot {
  width:32px; height:32px; border-radius:50%;
  background:var(--panel); border:2px solid #333;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:bold;
  transition:all 0.3s;
}
.day-dot.active { border-color:var(--accent); background:#2a1f00; color:var(--accent); }
.day-dot.done { border-color:var(--energy); background:#0a2a1a; color:var(--energy); }
.slot-marker { display:flex; gap:3px; align-items:center; }
.slot-dot {
  width:8px; height:8px; border-radius:50%; background:#333; transition:all 0.3s;
}
.slot-dot.done { background:var(--energy); }
.slot-dot.current { background:var(--accent); animation:pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ===== MAIN PANEL ===== */
#panel {
  width:100%; background:var(--panel); border-radius:16px; padding:24px 20px;
  text-align:center; min-height:280px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px;
  position:relative;
}
#panel h2 { font-size:20px; color:var(--accent); margin-bottom:4px; }
#panel p { font-size:14px; color:var(--dim); line-height:1.6; max-width:400px; }
#panel .info-text { color:var(--text); }

.btn-group { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; }
button {
  padding:14px 24px; border-radius:12px; border:none;
  font-size:16px; font-weight:bold; cursor:pointer;
  transition:all 0.2s; font-family:inherit;
  position:relative; overflow:hidden;
}
button:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.3); }
button:active { transform:translateY(0); }
.btn-primary { background:var(--accent); color:#1a1a2e; }
.btn-lib { background:#3a5a8c; color:#fff; }
.btn-dorm { background:#6b3a8c; color:#fff; }
.btn-study { background:var(--knowledge); color:#1a1a2e; }
.btn-play { background:var(--energy); color:#1a1a2e; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-item { background:#2a2a4a; color:var(--accent); border:1px solid var(--accent); font-size:13px; padding:10px 16px; }
.btn-small { font-size:13px; padding:8px 16px; }
.btn-shop { background:var(--score); color:#fff; }
button:disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }

/* ===== CANVAS FOR MINIGAME ===== */
#minigame-wrap {
  width:100%; position:relative; margin:8px 0;
}
#minigame-canvas {
  width:100%; border-radius:12px; background:#0d1117;
  cursor:crosshair; touch-action:none;
}
#minigame-timer {
  position:absolute; top:10px; right:14px;
  font-size:24px; font-weight:bold; color:var(--accent);
  background:rgba(0,0,0,0.6); padding:4px 12px; border-radius:20px;
}
#minigame-target {
  position:absolute; top:10px; left:14px;
  font-size:20px; background:rgba(0,0,0,0.6); padding:4px 12px; border-radius:20px;
}
#minigame-score {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:18px; font-weight:bold; color:#fff;
  background:rgba(0,0,0,0.6); padding:4px 16px; border-radius:20px;
}

/* ===== EVENT MODAL ===== */
.event-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.7); z-index:100;
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.3s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.event-card {
  background:var(--panel); border-radius:20px; padding:28px 24px;
  max-width:420px; width:90%; text-align:center;
  border:2px solid var(--accent);
}

/* ===== FLOATING TEXT ===== */
.float-text {
  position:fixed; pointer-events:none; z-index:200;
  font-weight:bold; font-size:24px;
  animation:floatUp 1.2s ease-out forwards;
}
@keyframes floatUp { 0%{opacity:1; transform:translateY(0)} 100%{opacity:0; transform:translateY(-80px)} }

/* ===== SHOP ===== */
.shop-item {
  display:flex; align-items:center; justify-content:space-between;
  width:100%; background:#1a1a30; border-radius:12px; padding:12px 14px;
  text-align:left; gap:10px;
}
.shop-item .item-icon { font-size:32px; }
.shop-item .item-info { flex:1; }
.shop-item .item-name { font-weight:bold; font-size:14px; color:var(--text); }
.shop-item .item-desc { font-size:11px; color:var(--dim); }
.shop-item .item-cost { color:var(--score); font-weight:bold; font-size:13px; white-space:nowrap; }

.inv-badge {
  display:inline-block; background:var(--accent); color:#1a1a2e;
  border-radius:10px; padding:2px 8px; font-size:11px; font-weight:bold; margin-left:4px;
}

/* ===== RESULT ===== */
.result-grade {
  font-size:64px; font-weight:bold; margin:10px 0;
}
.result-grade.S { color:#ffd700; }
.result-grade.A { color:var(--energy); }
.result-grade.B { color:var(--knowledge); }
.result-grade.C { color:var(--accent); }
.result-grade.F { color:var(--danger); }

@media (max-width:750px) {
  #game { flex-direction:column; align-items:center; }
  #history-sidebar { width:100%; max-width:520px; position:static; }
}
@media (max-width:400px) {
  #game { padding:12px; }
  #panel { padding:16px 12px; }
  button { padding:12px 18px; font-size:14px; }
}
</style>
</head>

<div id="game"></div>

// ---- 工具函数 ----
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function rng(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function modStat(which, delta) {
  const old = S[which];
  S[which] = clamp(S[which] + delta, 0, MAX_STAT);
  return S[which] - old;
}

// ---- 持久化 ----
function saveInventory() {
  const data = S.inventory.map(i=>({id:i.id, used:false}));
  localStorage.setItem('finals_inv', JSON.stringify(data));
  localStorage.setItem('finals_runs', S.totalRuns);
}
function loadInventory() {
  try {
    const raw = localStorage.getItem('finals_inv');
    if (raw) {
      const data = JSON.parse(raw);
      S.inventory = data.map(d=>{
        const tpl = ITEMS.find(it=>it.id===d.id);
        return tpl ? {...tpl, usedThisRun:false} : null;
      }).filter(Boolean);
    }
    S.totalRuns = parseInt(localStorage.getItem('finals_runs')||'0');
  } catch(e) { S.inventory = []; S.totalRuns = 0; }
}

// ---- 历史记录 ----
function loadScoreHistory() {
  try { const raw = localStorage.getItem('finals_history'); return raw ? JSON.parse(raw) : []; }
  catch(e) { return []; }
}
function saveScoreHistory(entry) {
  const history = loadScoreHistory();
  history.push(entry);
  localStorage.setItem('finals_history', JSON.stringify(history));
}
function renderHistorySidebar() {
  const history = loadScoreHistory();
  let html = '<div id="history-sidebar"><h3>📈 冲刺记录</h3>';
  if (history.length === 0) {
    html += '<div class="history-empty">暂无记录<br>完成一轮后自动记录</div>';
  } else {
    html += '<table id="history-table"><tr><th>#</th><th>成绩</th><th>评级</th></tr>';
    history.forEach(h => { html += `<tr><td>${h.run}</td><td style="color:var(--score)">${h.score}</td><td>${h.grade}</td></tr>`; });
    html += '</table><canvas id="history-chart" width="208" height="150"></canvas>';
  }
  html += '</div>';
  setTimeout(() => { if (history.length > 0) drawHistoryChart(history); }, 50);
  return html;
}
function drawHistoryChart(history) {
  const canvas = document.getElementById('history-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:15, right:18, bottom:22, left:30};
  const pw = W - pad.left - pad.right, ph = H - pad.top - pad.bottom;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1a2530'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) { const y = pad.top + ph * i / 4; ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke(); }
  ctx.setLineDash([3, 3]);
  [{v:60,c:'#f72585',l:'及格'},{v:80,c:'#06d6a0',l:'良好'},{v:95,c:'#ffd700',l:'优秀'}].forEach(t => {
    const y = pad.top + ph * (1 - t.v/100);
    ctx.strokeStyle = t.c; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
    ctx.fillStyle = t.c; ctx.font = '9px sans-serif'; ctx.fillText(t.l, W-pad.right+2, y+4);
  });
  ctx.setLineDash([]);
  const maxRun = Math.max(history.length, 2);
  const pts = history.map((h, i) => ({ x: pad.left + pw * i / Math.max(maxRun-1, 1), y: pad.top + ph * (1 - h.score/100) }));
  if (pts.length > 1) {
    ctx.strokeStyle = '#4cc9f0'; ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }
  pts.forEach(p => { ctx.fillStyle = '#4cc9f0'; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); });
  ctx.fillStyle = '#888'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  history.forEach((h, i) => { ctx.fillText(h.run, pad.left + pw * i / Math.max(maxRun-1, 1), H - 5); });
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) { ctx.fillText(Math.round(100 - i*25), pad.left-6, pad.top + ph*i/4 + 3); }
}

function renderDayIndicator() {
  let html = '<div id="day-indicator">';
  for (let d=1; d<=3; d++) {

    if (d < S.day) cls = 'done';
    else if (d === S.day) cls = 'active';
    html += `<div class="day-dot ${cls}">D${d}</div>`;
    if (d < 3) {
      html += '<div class="slot-marker">';
      for (let s=1; s<=3; s++) {

        if (d < S.day || (d===S.day && s<S.slot)) scls='done';

        html += `<div class="slot-dot ${scls}"></div>`;

// ==================== 道具使用 ====================
let _flashMsg = null;

function hasItemEffect(effKey) {
  for (const itemId of S.itemsUsedThisRun) {
    const item = S.inventory.find(i=>i.id===itemId);
    if (item && item.effect[effKey]) return true;
  }
  return false;
}

function getActiveBoosts() {
  let studyBoost = 0, knowledgeBoost = 0, playBoost = 0, energySave = 0, energySaveFlat = 0;
  for (const itemId of S.itemsUsedThisRun) {
    const item = S.inventory.find(i=>i.id===itemId);
    if (!item) continue;
    if (item.effect.studyBoost) studyBoost += item.effect.studyBoost;
    if (item.effect.knowledgeBoost) knowledgeBoost += item.effect.knowledgeBoost;
    if (item.effect.playBoost) playBoost += item.effect.playBoost;
    if (item.effect.allRunStudyBoost) studyBoost += item.effect.allRunStudyBoost;
    if (item.effect.allRunPlayBoost) playBoost += item.effect.allRunPlayBoost;
    if (item.effect.energySave) energySave += item.effect.energySave;
    if (item.effect.energySaveFlat) energySaveFlat += item.effect.energySaveFlat;
  }
  return { studyBoost, knowledgeBoost, playBoost, energySave, energySaveFlat };
}

function getLibBoost() {
  let boost = 0;
  if (S.location==='library' && hasItemEffect('libBoost')) boost += 0.10;
  return boost;
}

function renderBoostBadge() {
  if (S.itemsUsedThisRun.size === 0) return '';
  const boosts = getActiveBoosts();
  let parts = [];
  if (boosts.studyBoost > 0) parts.push(`学习+${Math.round(boosts.studyBoost*100)}%`);
  if (boosts.knowledgeBoost > 0) parts.push(`知识+${Math.round(boosts.knowledgeBoost*100)}%`);
  if (boosts.playBoost > 0) parts.push(`娱乐+${Math.round(boosts.playBoost*100)}%`);
  if (boosts.energySave > 0) parts.push(`省精${Math.round(boosts.energySave*100)}%`);
  if (boosts.energySaveFlat > 0) parts.push(`省精${boosts.energySaveFlat}`);
  if (parts.length === 0) return '';
  return `<p style="color:var(--energy);font-size:12px;margin-top:4px;">⚡ 当前增益：${parts.join(' · ')}</p>`;
}

function useItem(itemId) {
  const item = S.inventory.find(i=>i.id===itemId && !i.usedThisRun);
  if (!item) return;
  item.usedThisRun = true;
  S.itemsUsedThisRun.add(itemId);
  if (item.effect.energy) modStat('energy', item.effect.energy);
  let msg = `使用了 ${item.icon} ${item.name}！`;
  if (item.effect.energy) msg += ` 精力+${item.effect.energy}`;
  const hasBoost = item.effect.studyBoost || item.effect.knowledgeBoost || item.effect.libBoost || item.effect.allRunStudyBoost || item.effect.allRunPlayBoost || item.effect.playBoost || item.effect.energySave || item.effect.energySaveFlat;
  if (hasBoost) msg += '（增益已激活，持续到本轮结束）';
  _flashMsg = msg;
}

// ==================== PHASE: MINIGAME (10秒点击emoji) ====================
let mgState = null;

function phaseMinigame() {
  const actionName = S.action==='study'?'学习':'娱乐';
  const studyPool = ['📚','✏️','📖','🖊️','📝','💻','📐','🔬'];
  const playPool = ['🎮','🎬','🛏️','📱','🎵','🍿','🎧','💤'];
  const targetPool = S.action==='study'?studyPool:playPool;
  const distractorPool = S.action==='study'?playPool:studyPool;
  const targetShow = S.action==='study'?'📚✏️📖🖊️📝💻📐🔬':'🎮🎬🛏️📱🎵🍿🎧💤';

  let desc = S.action==='study'
    ? `<p>点击 <b>学习emoji</b> 获取学识，避开 <b>娱乐emoji</b>！</p>`
    : `<p>点击 <b>娱乐emoji</b> 获取精力，避开 <b>学习emoji</b>！</p>`;

  renderPanel(`⏱️ ${actionName}中...`,
    `${desc}
     <div id="minigame-wrap">
       <canvas id="minigame-canvas" width="460" height="400"></canvas>
       <div id="minigame-timer">10</div>
       <div id="minigame-target">${targetShow}</div>
       <div id="minigame-score">得分：0</div>
     </div>
     <p style="font-size:12px;color:var(--dim);">10秒倒计时！快速点击正确的emoji，点错扣分</p>`
  );

  setTimeout(()=>startMinigame(targetPool, distractorPool), 500);
}

function startMinigame(targetPool, distractorPool) {
  const canvas = document.getElementById('minigame-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const wrap = document.getElementById('minigame-wrap');
  if (wrap) {
    const w = Math.min(wrap.clientWidth, 460);
    if (w < 460) { canvas.style.width=w+'px'; canvas.style.height=(w*400/460)+'px'; }
  }

  mgState = {
    canvas, ctx, W, H,
    targetPool, distractorPool,
    emojis: [],
    score: 0,
    timeLeft: 10,
    spawnTimer: 0,
    spawnInterval: 0.18,
    running: true,
    lastTime: performance.now(),
  };

  canvas.addEventListener('click', onMinigameClick);
  canvas.addEventListener('touchstart', onMinigameTouch, {passive:false});
  requestAnimationFrame(mgLoop);
}

function onMinigameClick(e) {
  if (!mgState || !mgState.running) return;
  const rect = mgState.canvas.getBoundingClientRect();
  const scaleX = mgState.W / rect.width;
  const scaleY = mgState.H / rect.height;
  checkEmojiHit((e.clientX-rect.left)*scaleX, (e.clientY-rect.top)*scaleY, e.clientX, e.clientY);
}

function onMinigameTouch(e) {
  if (!mgState || !mgState.running) return;
  e.preventDefault();
  const rect = mgState.canvas.getBoundingClientRect();
  const scaleX = mgState.W / rect.width;
  const scaleY = mgState.H / rect.height;
  for (const touch of e.changedTouches) {
    checkEmojiHit((touch.clientX-rect.left)*scaleX, (touch.clientY-rect.top)*scaleY, touch.clientX, touch.clientY);
  }
}

function checkEmojiHit(cx, cy, screenX, screenY) {
  for (let i = mgState.emojis.length-1; i >= 0; i--) {
    const em = mgState.emojis[i];
    if (em.hit) continue;
    const dx = cx - em.x, dy = cy - em.y;
    if (Math.sqrt(dx*dx+dy*dy) < em.radius) {
      if (em.type === 'target') {
        mgState.score++;
        floatText(screenX, screenY, '+1', '#06d6a0');
      } else {
        mgState.score--;
        floatText(screenX, screenY, '-1', '#ef476f');
      }
      em.hit = true;
      em.burstTime = 0.25;
      return;
    }
  }
}

function mgLoop(timestamp) {
  if (!mgState || !mgState.running) return;
  const s = mgState;
  const dt = Math.min((timestamp - s.lastTime) / 1000, 0.1);
  s.lastTime = timestamp;

  s.timeLeft -= dt;
  if (s.timeLeft <= 0) { s.timeLeft = 0; endMinigame(); return; }

  // Spawn emojis — fast pace for 10-second game
  s.spawnTimer += dt;
  const rate = 0.15 + (10 - s.timeLeft) * 0.025; // speeds up
  if (s.spawnTimer >= rate) {
    s.spawnTimer -= rate;
    const isTarget = Math.random() < 0.55;
    const pool = isTarget?s.targetPool:s.distractorPool;
    s.emojis.push({
      type: isTarget?'target':'distractor',
      emoji: pool[Math.floor(Math.random()*pool.length)],
      x: 30 + Math.random()*(s.W-60),
      y: -30,
      speed: 100 + Math.random()*130,
      radius: 28,
      hit: false,
      burstTime: 0,
    });
  }

  // Update
  for (const em of s.emojis) {
    if (em.hit) { em.burstTime -= dt; em.radius += dt*100; }
    else { em.y += em.speed * dt; }
  }
  s.emojis = s.emojis.filter(em => em.hit ? em.burstTime>0 : em.y < s.H+50);

  // Draw
  const ctx = s.ctx;
  ctx.clearRect(0,0,s.W,s.H);
  ctx.strokeStyle='#1a2530'; ctx.lineWidth=0.5;
  for (let gx=0;gx<s.W;gx+=30){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,s.H);ctx.stroke();}
  for (let gy=0;gy<s.H;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(s.W,gy);ctx.stroke();}

  for (const em of s.emojis) {
    ctx.save();
    ctx.globalAlpha = em.hit ? Math.max(0,em.burstTime/0.25) : 0.9;
    ctx.font = `${em.radius*1.1}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(em.emoji, em.x, em.y);
    ctx.restore();
  }

  document.getElementById('minigame-timer').textContent = Math.ceil(s.timeLeft);
  document.getElementById('minigame-score').textContent = `得分：${s.score}`;

  requestAnimationFrame(mgLoop);
}

function endMinigame() {
  mgState.running = false;
  mgState.canvas.removeEventListener('click', onMinigameClick);
  mgState.canvas.removeEventListener('touchstart', onMinigameTouch);
  S.minigameResult = mgState.score;

  const slotIdx = S.slot - 1;
  const isMorning = slotIdx === 0;
  const isAfternoon = slotIdx === 1;
  const isEvening = slotIdx === 2;
  const isLibrary = S.location === 'library';

  const boosts = getActiveBoosts();
  const libBoost = getLibBoost();

  let knowledgeDelta = 0, energyDelta = 0;

  if (S.action === 'study') {
    // 时间影响学习效率（隐藏机制）
    if (isMorning) knowledgeDelta = rng(4, 6);
    else if (isAfternoon) knowledgeDelta = rng(3, 5);
    else knowledgeDelta = rng(2, 4);

    if (isLibrary) knowledgeDelta = Math.round(knowledgeDelta * (1.1 + libBoost));
    knowledgeDelta = Math.round(knowledgeDelta * (1 + boosts.studyBoost + boosts.knowledgeBoost));
    // 边际效应：小游戏分数开根号，20次和40次差距大，100次和200次差距小
    const mgSignK = Math.sign(S.minigameResult);
    const mgEffK = mgSignK * Math.round(2.5 * Math.sqrt(Math.abs(S.minigameResult)));
    knowledgeDelta += mgEffK;

    if (isMorning) energyDelta = rng(-10, -13);
    else if (isAfternoon) energyDelta = rng(-13, -16);
    else energyDelta = rng(-15, -19);
    // 道具减免精力消耗
    if (boosts.energySave > 0) energyDelta = Math.round(energyDelta * (1 - Math.min(boosts.energySave, 0.8)));
    if (boosts.energySaveFlat > 0) energyDelta = Math.min(0, energyDelta + boosts.energySaveFlat);

    // 低精力惩罚
    if (S.energy < 15 && !hasItemEffect('energyShield')) {
      knowledgeDelta = Math.round(knowledgeDelta * 0.4);
    } else if (S.energy < 30 && !hasItemEffect('energyShield')) {
      knowledgeDelta = Math.round(knowledgeDelta * 0.7);
    }
  } else {
    // 娱乐 — 晚上效率最高（隐藏机制）
    if (isMorning) energyDelta = rng(3, 5);
    else if (isAfternoon) energyDelta = rng(4, 7);
    else energyDelta = rng(5, 8);

    if (!isLibrary) energyDelta = Math.round(energyDelta * 1.15);
    if (boosts.playBoost > 0) energyDelta = Math.round(energyDelta * (1 + boosts.playBoost));
    const mgSignE = Math.sign(S.minigameResult);
    const mgEffE = mgSignE * Math.round(2.5 * Math.sqrt(Math.abs(S.minigameResult)));
    energyDelta += mgEffE;
    knowledgeDelta = isEvening ? rng(-1, 0) : rng(-2, 0);
  }

  const actualK = modStat('knowledge', knowledgeDelta);
  const actualE = modStat('energy', energyDelta);

  // 成绩更新
  const scoreGain = Math.round(Math.max(0, actualK) * 0.55 + Math.max(0, actualE) * 0.20);
  modStat('score', scoreGain);

  showMinigameResult(actualK, actualE, scoreGain);
}

function showMinigameResult(knowledgeDelta, energyDelta, scoreGain) {
  let resultHtml = S.action==='study' ? '<p class="info-text">📚 学习结束！</p>' : '<p class="info-text">🎮 娱乐结束！</p>';
  resultHtml += `<p>小游戏得分：<b>${S.minigameResult}</b></p>`;

  if (knowledgeDelta !== 0) {
    const c = knowledgeDelta>0?'var(--knowledge)':'var(--danger)';
    resultHtml += `<p style="color:${c}">学识 ${knowledgeDelta>0?'+':''}${knowledgeDelta}</p>`;
  }
  if (energyDelta !== 0) {
    const c = energyDelta>0?'var(--energy)':'var(--danger)';
    resultHtml += `<p style="color:${c}">精力 ${energyDelta>0?'+':''}${energyDelta}</p>`;
  }
  if (scoreGain > 0) resultHtml += `<p style="color:var(--score)">成绩 +${scoreGain}</p>`;

  // 特殊加成（60%概率触发，根据地点+行动组合）
  let bonusText = '';
  if (Math.random() < 0.6) {
    if (S.location==='library' && S.action==='study') {
      modStat('knowledge', 3); bonusText = '📚 专注力爆发！学识+3';
    } else if (S.location==='library' && S.action==='play') {
      modStat('energy', 5); bonusText = '😈 罪恶的快感！精力+5';
    } else if (S.location==='dorm' && S.action==='study') {
      modStat('knowledge', 2); bonusText = '💪 逆境中坚持！学识+2';
    } else if (S.location==='dorm' && S.action==='play') {
      modStat('energy', 3); bonusText = '😴 彻底放松~精力+3';
    }
  }
  if (bonusText) resultHtml += `<p style="color:var(--accent);font-size:14px;">✨ ${bonusText}</p>`;

  if (S.energy <= 5) resultHtml += `<p style="color:var(--danger);margin-top:8px;">😵 精力见底了！你需要休息！</p>`;

  resultHtml += `<div class="btn-group" style="margin-top:8px;">${btn('continue','继续','btn-primary')}</div>`;
  renderPanel('📊 时段结算', resultHtml);

  pendingCallback = (id) => {
    if (id === 'continue') {
      if (Math.random() < 0.70 && S.slot <= 3 && S.day <= 3) {
        S.phase = 'EVENT'; phaseRandomEvent();
      } else {
        advanceSlot();
      }
    }
  };
}

// ==================== PHASE: RANDOM EVENT ====================
let currentEvent = null, eventTruthIsA = null;

function phaseRandomEvent() {
  const available = EVENTS.filter(e => !S.usedEventIds.includes(e.id));
  if (available.length === 0) { advanceSlot(); return; }
  currentEvent = pick(available);
  S.usedEventIds.push(currentEvent.id);
  eventTruthIsA = Math.random() < 0.5;

  const choicesHtml = currentEvent.choices.map((c,i)=>
    `<button class="btn-primary" style="margin:4px;" onclick="handleClick('choice_${i}')">${c}</button>`
  ).join('');

  renderPanel('🎲 偶然事件！',
    `<h3 style="color:var(--accent);">${currentEvent.title}</h3>
     <p class="info-text">${currentEvent.desc}</p>
     <p style="color:var(--dim);font-size:12px;">（事件走向未知，凭直觉选择）</p>
     <div class="btn-group">${choicesHtml}</div>`
  );

  pendingCallback = (id) => {
    if (id.startsWith('choice_')) {
      resolveEvent(parseInt(id.replace('choice_','')));
    }
  };
}

function resolveEvent(choiceIdx) {
  const truth = eventTruthIsA ? currentEvent.truthA : currentEvent.truthB;
  const outcomeDesc = truth.outcomes[choiceIdx];
  const apply = eventTruthIsA ? currentEvent.applyA[choiceIdx] : currentEvent.applyB[choiceIdx];

  let changesHtml = '';
  if (apply.k) {
    const actual = modStat('knowledge', apply.k);
    changesHtml += `<p style="color:${actual>=0?'var(--knowledge)':'var(--danger)'}">学识 ${actual>0?'+':''}${actual}</p>`;
    if (actual > 0) {
      const sg = Math.round(actual * 0.50);
      modStat('score', sg);
      if (sg>0) changesHtml += `<p style="color:var(--score);font-size:12px;">成绩 +${sg}</p>`;
    }
  }
  if (apply.e) {
    const actual = modStat('energy', apply.e);
    changesHtml += `<p style="color:${actual>=0?'var(--energy)':'var(--danger)'}">精力 ${actual>0?'+':''}${actual}</p>`;
  }
  if (!apply.k && !apply.e) changesHtml = '<p>数值无变化</p>';

  renderPanel('🎲 事件结果',
    `<p style="color:var(--accent);">${currentEvent.title}</p>
     <p style="font-size:13px;color:var(--dim);">真相：${truth.name} — ${truth.desc}</p>
     <p style="font-weight:bold;margin:8px 0;color:var(--text);">你的选择：${currentEvent.choices[choiceIdx]} → ${outcomeDesc}</p>
     ${changesHtml}
     <div class="btn-group" style="margin-top:8px;">${btn('ev_ok','继续','btn-primary')}</div>`
  );

  pendingCallback = (id) => { if (id === 'ev_ok') advanceSlot(); };
}

// ==================== ADVANCE ====================
function advanceSlot() {
  S.slot++;
  if (S.slot > 3) {
    S.slot = 1; S.day++;
    if (S.day > 3) { S.phase='GAME_END'; phaseGameEnd(); return; }
    phaseDayEnd(); return;
  }
  S.phase = 'CHOOSE_LOCATION';
  phaseChooseLocation();
}

function phaseDayEnd() {
  renderPanel(`🌙 第${S.day-1}天结束`,
    `<p class="info-text">你度过了第${S.day-1}天...</p>
     <p>学识：<b style="color:var(--knowledge)">${S.knowledge}</b></p>
     <p>精力：<b style="color:var(--energy)">${S.energy}</b></p>
     <p>成绩：<b style="color:var(--score)">${S.score}</b></p>
     <p style="color:var(--dim);font-size:13px;">还剩 ${4-S.day} 天，加油！</p>
     <div class="btn-group">${btn('nextday','开始新的一天 🌅','btn-primary')}</div>`
  );
  pendingCallback = (id) => {
    if (id === 'nextday') {
      modStat('energy', rng(5, 12)); // 过夜精力回复
      S.phase = 'CHOOSE_LOCATION'; phaseChooseLocation();
    }
  };
}

// ==================== PHASE: GAME END ====================
function phaseGameEnd() {
  const fs = S.score;
  let grade, gradeClass, gradeText;
  if (fs >= 95) { grade='S'; gradeClass='S'; gradeText='🏆 优秀！你是卷王！'; }
  else if (fs >= 80) { grade='A'; gradeClass='A'; gradeText='👏 良好！稳了稳了'; }
  else if (fs >= 60) { grade='B'; gradeClass='B'; gradeText='😅 及格了，勉强过关'; }
  else if (fs >= 40) { grade='C'; gradeClass='C'; gradeText='😰 不太妙...'; }
  else { grade='F'; gradeClass='F'; gradeText='💀 挂科了...但可以重来！'; }

  let advice;
  if (S.knowledge >= 80 && S.energy < 40 && fs < 75) {
    advice = '💡 学识很扎实，但考试时精力不足拖了后腿！好成绩需要充沛的精力哦 ⚡ 下次多穿插娱乐回复精力';
  } else if (S.knowledge >= 80 && S.energy < 50) {
    advice = '⚡ 学识不错，但精力偏低影响发挥。考试不仅拼知识，也拼状态！';
  } else if (fs < 60) {
    advice = '💡 提示：合理管理精力，图书馆上午学习效率最高。用本轮成绩去商店买道具吧！';
  } else {
    advice = '💡 道具可以跨轮继承，去商店消费本轮成绩吧！';
  }

  saveScoreHistory({ run: S.runCount, score: S.score, grade: grade, knowledge: S.knowledge, energy: S.energy });
  saveInventory();

  renderPanel('📋 期末考试结果',
    `<div class="result-grade ${gradeClass}">${grade}</div>
     <p style="font-weight:bold;color:var(--text);">${gradeText}</p>
     <p>最终成绩：<b style="color:var(--score);font-size:24px;">${fs}</b></p>
     <p style="color:var(--dim);">学识：${S.knowledge} | 精力：${S.energy}</p>
     <p style="font-size:13px;color:var(--dim);">${advice}</p>
     <div class="btn-group">
       ${btn('shop','🛒 道具商店','btn-shop')}
       ${btn('rebirth','🔄 重新冲刺','btn-primary')}
     </div>`
  );

  pendingCallback = (id) => {
    if (id === 'shop') { S.phase='SHOP'; phaseShop(); }
    if (id === 'rebirth') { phaseTitle(); }
  };
}

// ==================== PHASE: SHOP ====================
function phaseShop() {
  const currency = S.score;
  let itemsHtml = '';
  ITEMS.forEach(item => {
    const owned = S.inventory.find(i=>i.id===item.id);
    const canBuy = currency >= item.cost && !owned;
    itemsHtml += `
      <div class="shop-item">
        <div class="item-icon">${item.icon}</div>
        <div class="item-info">
          <div class="item-name">${item.name}${owned?'<span class="inv-badge">已拥有</span>':''}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        <div class="item-cost">${item.cost}分</div>
        ${canBuy ? `<button class="btn-item btn-small" onclick="handleClick('buy_${item.id}')">购买</button>` : ''}
      </div>
    `;
  });

  renderPanel('🛒 道具商店',
    `<p>可用成绩：<b style="color:var(--score);">${currency}</b></p>
     <p style="font-size:12px;color:var(--dim);">道具购买后永久拥有，每轮可使用一次</p>
     <div style="width:100%;display:flex;flex-direction:column;gap:8px;margin:8px 0;">${itemsHtml}</div>
     ${S.inventory.length>0?`<p style="font-size:12px;color:var(--accent);">🎒 背包：${S.inventory.map(i=>i.icon).join(' ')}</p>`:''}
     <div class="btn-group">
       ${btn('rebirth_shop','开始新一轮冲刺 🔄','btn-primary')}
     </div>`
  );

  pendingCallback = (id) => {
    if (id === 'rebirth_shop') { phaseTitle(); }
    if (id.startsWith('buy_')) {
      const itemId = id.replace('buy_','');
      const item = ITEMS.find(i=>i.id===itemId);
      if (item && S.score >= item.cost && !S.inventory.find(i=>i.id===itemId)) {
        S.score -= item.cost;
        S.inventory.push({...item, usedThisRun:false});
        saveInventory();
        phaseShop();
      }
    }
  };
}

// ==================== 启动！ ====================
loadInventory();
phaseTitle();
</script>
